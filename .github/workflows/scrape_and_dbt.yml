name: Scrape Results + dbt Run

# Runs every Monday, Wednesday, Saturday at 07:30 UTC (= 09:30 CET)
on:
  schedule:
    - cron: "30 7 * * 1"    # Monday    07:30 UTC → 09:30 CET (30min after fetch-odds)
    - cron: "30 7 * * 3"    # Wednesday 07:30 UTC → 09:30 CET
    - cron: "30 7 * * 6"    # Saturday  07:30 UTC → 09:30 CET
  workflow_dispatch:         # allow manual trigger from GitHub UI

jobs:
  scrape-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Parse PG_URL into individual env vars
        run: |
          python - <<'EOF'
          import os, pathlib
          from urllib.parse import urlparse
          url = os.environ["PG_URL"]
          parsed = urlparse(url)
          env_path = pathlib.Path(os.environ["GITHUB_ENV"])
          with env_path.open("a") as f:
              f.write(f"PG_USER={parsed.username}\n")
              f.write(f"PG_PASSWORD={parsed.password}\n")
              f.write(f"PG_HOST={parsed.hostname}\n")
              f.write(f"PG_PORT={parsed.port}\n")
              f.write(f"PG_DBNAME={parsed.path.lstrip('/')}\n")
          EOF
        env:
          PG_URL: ${{ secrets.PG_URL }}

      - name: Run scrape_results.py
        run: python goal_genius_db/scripts/scrape_results.py
        env:
          PG_URL: ${{ secrets.PG_URL }}

      - name: Install dbt packages
        working-directory: goal_genius_db
        run: dbt deps

      - name: dbt seed
        working-directory: goal_genius_db
        run: dbt seed

      - name: dbt run
        working-directory: goal_genius_db
        run: dbt run
