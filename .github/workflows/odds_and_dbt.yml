name: Fetch Odds

# Runs every Sunday at 22:00 UTC (= 23:00 CET), 1h before scrape_and_dbt at 23:10 UTC
on:
  schedule:
    - cron: "0 22 * * 0"    # Sunday 22:00 UTC → 23:00 CET (1h before scrape_and_dbt)
  workflow_dispatch:         # allow manual trigger from GitHub UI

jobs:
  fetch-odds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Parse PG_URL into individual env vars
        run: |
          python - <<'EOF'
          import os, pathlib
          from urllib.parse import urlparse
          url = os.environ["PG_URL"]
          parsed = urlparse(url)
          env_path = pathlib.Path(os.environ["GITHUB_ENV"])
          with env_path.open("a") as f:
              f.write(f"PG_USER={parsed.username}\n")
              f.write(f"PG_PASSWORD={parsed.password}\n")
              f.write(f"PG_HOST={parsed.hostname}\n")
              f.write(f"PG_PORT={parsed.port}\n")
              f.write(f"PG_DBNAME={parsed.path.lstrip('/')}\n")
          EOF
        env:
          PG_URL: ${{ secrets.PG_URL }}

      - name: Run api_weekly_odds.py
        run: python goal_genius_db/scripts/api_weekly_odds.py
        env:
          PG_URL: ${{ secrets.PG_URL }}
          API_KEY: ${{ secrets.API_KEY }}
